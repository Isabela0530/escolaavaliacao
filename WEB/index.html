<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login Professor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">

        <h1>Bem Vindo</h1>

        <input
            type="email"
            id="email"
            placeholder="E-mail"
        >

        <input
            type="password"
            id="senha"
            placeholder="Senha"
        >

        <button onclick="login()">
            Entrar
        </button>

    </div>

    <script src="login.js"></script>

</body>
</html>
