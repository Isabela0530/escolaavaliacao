<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="topbar">
        <h2>Atividades da Turma</h2>

        <button onclick="logout()">
            Sair
        </button>
    </div>

    <div class="container">

        <button onclick="voltar()">
            Voltar
        </button>

        <br><br>

        <input
            type="text"
            id="descricao"
            placeholder="Descrição da atividade"
        >

        <button onclick="cadastrarAtividade()">
            Cadastrar Atividade
        </button>

        <div id="listaAtividades"></div>

    </div>

    <script src="atividades.js"></script>

</body>
</html>
